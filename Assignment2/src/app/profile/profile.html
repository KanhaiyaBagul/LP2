<div class="row justify-content-center mt-5">
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-header bg-info text-white">
        <h4 class="mb-0">User Profile</h4>
      </div>
      <div class="card-body">
        @if (user()) {
          <div class="row">
            <div class="col-md-4 text-center border-end">
              <img src="https://ui-avatars.com/api/?name={{ user().name }}&background=random&size=150" class="img-fluid rounded-circle mb-3" alt="Profile Image">
              <h5>{{ user().name }}</h5>
            </div>
            <div class="col-md-8">
              <h5 class="border-bottom pb-2">Profile Information</h5>
              <div class="row mt-3">
                <div class="col-sm-4">
                  <p class="text-muted mb-0">Full Name</p>
                </div>
                <div class="col-sm-8">
                  <p class="mb-0 fw-bold">{{ user().name }}</p>
                </div>
              </div>
              <hr>
              <div class="row">
                <div class="col-sm-4">
                  <p class="text-muted mb-0">Email</p>
                </div>
                <div class="col-sm-8">
                  <p class="mb-0 fw-bold">{{ user().email }}</p>
                </div>
              </div>
            </div>
          </div>
        } @else {
          <div class="alert alert-warning">
            You are not logged in. <a routerLink="/login">Please login</a>.
          </div>
        }
      </div>
    </div>
  </div>
</div>
