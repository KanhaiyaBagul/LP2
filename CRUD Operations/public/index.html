<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dashboard - Item Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-radius: 12px;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: var(--surface);
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Panels */
        .panel {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f8fafc;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background-color: #fff;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-danger {
            background: #fee2e2;
            color: var(--danger);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .btn-edit {
            background: #e0e7ff;
            color: var(--primary);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            margin-right: 0.5rem;
        }

        .btn-edit:hover {
            background: var(--primary);
            color: white;
        }

        /* Data Table */
        .table-container {
            width: 100%;
            overflow-x: auto;
            background: var(--surface);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
        }

        .crud-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .crud-table th, .crud-table td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .crud-table th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .crud-table tbody tr:hover {
            background-color: #f8fafc;
        }

        .crud-table td {
            color: var(--text-main);
            vertical-align: middle;
        }

        .actions-cell {
            display: flex;
            gap: 0.5rem;
        }

        /* Status Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success { border-left: 4px solid var(--success); }
        .toast-error { border-left: 4px solid var(--danger); }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            background: transparent;
            border: 2px dashed #cbd5e1;
            border-radius: var(--border-radius);
        }

        /* Editing mode */
        body.editing .panel-title::after {
            content: " (Edit Mode)";
            color: var(--primary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1>Item Dashboard ✨</h1>
        <div style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500;">CRUD Operations</div>
    </nav>

    <div class="container">
        <!-- Form Panel -->
        <div class="panel">
            <h2 class="panel-title" id="formTitle">Add New Item</h2>
            <form id="itemForm">
                <input type="hidden" id="itemId">
                
                <div class="form-group">
                    <label class="form-label">Item Name</label>
                    <input type="text" id="name" class="form-control" placeholder="e.g. Wireless Headphones" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Price ($)</label>
                    <input type="number" id="price" class="form-control" placeholder="e.g. 199.99" step="0.01" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="description" class="form-control" rows="4" placeholder="Brief description of the product..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">Save Item</button>
                <button type="button" class="btn" id="cancelBtn" style="width: 100%; margin-top: 10px; display: none; border: 1px solid #cbd5e1;">Cancel Edit</button>
            </form>
        </div>

        <!-- Data Table Panel -->
        <div class="panel" style="padding: 0; overflow: hidden;">
            <div style="padding: 1.5rem 2rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
                <h2 class="panel-title" style="margin: 0;">Inventory List</h2>
                <span id="itemCount" style="background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">0 items</span>
            </div>
            <div class="table-container">
                <table class="crud-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="itemsContainer">
                        <!-- Items will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <span id="toastMsg"></span>
    </div>

    <script>
        const API_URL = '/api/items';
        const form = document.getElementById('itemForm');
        const container = document.getElementById('itemsContainer');
        const itemCountSpan = document.getElementById('itemCount');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const formTitle = document.getElementById('formTitle');

        let isEditing = false;

        // Fetch Items on Load
        document.addEventListener('DOMContentLoaded', fetchItems);

        async function fetchItems() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                renderItems(data.data || []);
            } catch (err) {
                showToast('Failed to load items', 'error');
            }
        }

        function renderItems(items) {
            itemCountSpan.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
            
            if (items.length === 0) {
                container.innerHTML = `
                    <tr>
                        <td colspan="4">
                            <div class="empty-state">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; color: #94a3b8;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                                <h3>No items found</h3>
                                <p style="margin-top: 0.5rem;">Create your first item using the form.</p>
                            </div>
                        </td>
                    </tr>`;
                return;
            }

            container.innerHTML = items.map(item => `
                <tr>
                    <td style="font-weight: 600;">${escapeHtml(item.name)}</td>
                    <td style="color: var(--text-muted);">${escapeHtml(item.description || '-')}</td>
                    <td style="font-weight: 600; color: var(--primary);">$${item.price != null ? item.price : '0'}</td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn btn-edit" onclick="editItem('${item._id}', '${escapeHtml(item.name)}', ${item.price}, '${escapeHtml(item.description || '')}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('${item._id}')">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Add or Update Item
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('itemId').value;
            const itemData = {
                name: document.getElementById('name').value,
                price: parseFloat(document.getElementById('price').value),
                description: document.getElementById('description').value
            };

            try {
                let res;
                if (isEditing) {
                    res = await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(itemData)
                    });
                } else {
                    res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(itemData)
                    });
                }

                if (res.ok) {
                    showToast(isEditing ? 'Item updated!' : 'Item created!', 'success');
                    resetForm();
                    fetchItems();
                } else {
                    const errData = await res.json();
                    showToast(errData.message || 'Error saving item', 'error');
                }
            } catch (err) {
                showToast('Network error', 'error');
            }
        });

        // Delete Item
        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            
            try {
                const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('Item deleted!', 'success');
                    fetchItems();
                } else {
                    showToast('Error deleting item', 'error');
                }
            } catch (err) {
                showToast('Network error', 'error');
            }
        }

        // Setup Edit Mode
        window.editItem = function(id, name, price, description) {
            isEditing = true;
            document.body.classList.add('editing');
            formTitle.textContent = 'Update Item';
            submitBtn.textContent = 'Save Changes';
            cancelBtn.style.display = 'block';

            document.getElementById('itemId').value = id;
            document.getElementById('name').value = unescapeHtml(name);
            document.getElementById('price').value = price;
            document.getElementById('description').value = unescapeHtml(description);
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Cancel Edit
        cancelBtn.addEventListener('click', resetForm);

        function resetForm() {
            form.reset();
            isEditing = false;
            document.body.classList.remove('editing');
            document.getElementById('itemId').value = '';
            formTitle.textContent = 'Add New Item';
            submitBtn.textContent = 'Save Item';
            cancelBtn.style.display = 'none';
        }

        // Toast Notification
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            
            toast.className = `toast toast-${type} show`;
            toastMsg.textContent = msg;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Utility to prevent XSS
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        function unescapeHtml(str) {
            const div = document.createElement('div');
            div.innerHTML = str;
            return div.textContent;
        }
    </script>
</body>
</html>
